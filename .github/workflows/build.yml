name: "Build & Draft Release"

"on":
  push:
    tags:
      - 'v*'

env:
  INTG_NAME: xbox
  PYTHON_VER: 3.11.12-0.3.0

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get-version-and-id.outputs.VERSION }}
      driver_id: ${{ steps.get-version-and-id.outputs.DRIVER_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Get version and id
        id: get-version-and-id
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DRIVER_ID=$(jq .driver_id -r driver.json)" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "DRIVER_ID=$(jq .driver_id -r driver.json)" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system-arm binfmt-support qemu-user-static
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker run --rm --name builder \
            --platform=linux/arm64 \
            --user=$(id -u):$(id -g) \
            -v ${GITHUB_WORKSPACE}:/workspace \
            docker.io/unfoldedcircle/r2-pyinstaller:${PYTHON_VER} \
            bash -c \
            "cd /workspace && \
              python -m pip install -r requirements.txt && \
              pyinstaller --clean --onedir --name driver \
                --add-data driver.json:. \
                --collect-all zeroconf \
                --collect-all ucapi \
                --collect-all ucapi_framework \
                --collect-all pythonxbox \
                --hidden-import uc_intg_${INTG_NAME}.driver \
                --hidden-import uc_intg_${INTG_NAME}.device \
                --hidden-import uc_intg_${INTG_NAME}.config \
                --hidden-import uc_intg_${INTG_NAME}.client \
                --hidden-import uc_intg_${INTG_NAME}.setup_flow \
                --hidden-import uc_intg_${INTG_NAME}.const \
                --hidden-import uc_intg_${INTG_NAME}.media_player_entity \
                --hidden-import uc_intg_${INTG_NAME}.remote_entity \
                --hidden-import uc_intg_${INTG_NAME}.sensor_entity \
                --hidden-import uc_intg_${INTG_NAME}.oauth_server \
                --paths . \
                uc_intg_${INTG_NAME}/__init__.py"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/bin
          mv dist/driver/* artifacts/bin/
          cp driver.json artifacts/
          echo "ARTIFACT_NAME=uc-intg-${{ env.DRIVER_ID }}-${{ env.VERSION }}-aarch64" >> $GITHUB_ENV

      - run: tar czvf ${{ env.ARTIFACT_NAME }}.tar.gz -C ${GITHUB_WORKSPACE}/artifacts .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uc-intg-xbox
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    needs: [build, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: uc-intg-*
      - run: for D in *; do if [ -d "${D}" ]; then mv $D/* ./; fi; done
      - run: |
          for f in *.tar.gz; do
            echo "sha256 $(sha256sum $f)" >> ${{needs.build.outputs.driver_id}}.hash
          done
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "*.tar.gz,${{needs.build.outputs.driver_id}}.hash"
          draft: true
          generateReleaseNotes: true
          artifactErrorsFailBuild: true
          tag: v${{needs.build.outputs.version}}
